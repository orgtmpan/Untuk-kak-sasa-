<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kak Sasa 💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="foto.jpg" alt="Foto Kak Sasa" class="foto">

    <h1>Tulus ucapan dan harapan terbaik untuk pacarku yaa, terimakasih. 💗</h1>

    <p>
        Silakan tuliskan ucapan dan harapan terbaikmu untuk Kak Sasa/Kak Sera.
    </p>

    <input type="text" id="nama" placeholder="Masukkan nama kamu">

    <textarea id="ucapan" placeholder="Tulis ucapan di sini..." maxlength="500"></textarea>

    <button onclick="kirimUcapan()">Kirim Ucapan 💌</button>

</div>

<script src="script.js"></script>

</body>
</html>
